<!DOCTYPE html>
<html>
<head>
<style>
  .test-wrap {
    width: 300px;
    height: 300px;
    background-color: #f4e7d3; /* Parchment color */
    background-image: url('assets/mattys_cookie_logo_ny.png');
    background-size: 50px;
    background-repeat: repeat;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 1px solid #ccc;
    position: relative;
    overflow: hidden;
  }
  .test-wrap::before {
    content: "";
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(244, 231, 211, 0.4); /* Overlay to fade logos */
    z-index: 1;
  }
  .cookie-img {
    width: 250px;
    mix-blend-mode: multiply;
    z-index: 2;
  }
</style>
</head>
<body>
  <div class="test-wrap">
    <img src="assets/ny_cookie_classic.png" class="cookie-img">
  </div>
</body>
</html>
