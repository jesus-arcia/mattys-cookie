<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <defs>
    <!-- Sombra suave debajo de la galleta -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="22" flood-color="rgba(30,30,46,0.22)"/>
    </filter>
    <!-- Sombra del topping -->
    <filter id="shadow-sm" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="rgba(30,30,46,0.18)"/>
    </filter>
    <!-- Gradiente de la galleta (efecto horneado) -->
    <radialGradient id="cookie-grad" cx="42%" cy="38%" r="58%">
      <stop offset="0%"   stop-color="#F0C070"/>
      <stop offset="55%"  stop-color="#E8A84A"/>
      <stop offset="100%" stop-color="#C8783A"/>
    </radialGradient>
    <!-- Borde tostado de la galleta -->
    <radialGradient id="cookie-edge" cx="50%" cy="50%" r="50%">
      <stop offset="72%"  stop-color="transparent"/>
      <stop offset="100%" stop-color="rgba(150,80,20,0.35)"/>
    </radialGradient>
    <!-- Topping pistacho -->
    <linearGradient id="pist-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"  stop-color="#8DB87A"/>
      <stop offset="100%" stop-color="#A8CC88"/>
    </linearGradient>
    <!-- Topping chocolate -->
    <linearGradient id="choc-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"  stop-color="#4A2410"/>
      <stop offset="100%" stop-color="#6B3820"/>
    </linearGradient>
  </defs>

  <!-- === SOMBRA DE LA GALLETA (elipse debajo) === -->
  <ellipse cx="250" cy="450" rx="185" ry="28" fill="rgba(30,30,46,0.12)"/>

  <!-- === GALLETA PLANA === -->
  <!-- Cuerpo principal -->
  <circle cx="250" cy="235" r="190" fill="url(#cookie-grad)" filter="url(#shadow)"/>
  <!-- Borde tostado -->
  <circle cx="250" cy="235" r="190" fill="url(#cookie-edge)"/>
  <!-- Textura de la superficie (círculo interior levemente más claro) -->
  <circle cx="250" cy="235" r="175" fill="rgba(255,255,255,0.07)"/>

  <!-- Chips de chocolate incrustados en la galleta -->
  <!-- Chip 1 -->
  <ellipse cx="158" cy="195" rx="13" ry="10" fill="#3D1E08" transform="rotate(-20 158 195)"/>
  <ellipse cx="155" cy="191" rx="5" ry="3" fill="rgba(255,255,255,0.12)" transform="rotate(-20 155 191)"/>
  <!-- Chip 2 -->
  <ellipse cx="305" cy="170" rx="14" ry="10" fill="#3D1E08" transform="rotate(15 305 170)"/>
  <ellipse cx="302" cy="166" rx="5" ry="3" fill="rgba(255,255,255,0.12)" transform="rotate(15 302 166)"/>
  <!-- Chip 3 -->
  <ellipse cx="345" cy="260" rx="12" ry="9" fill="#3D1E08" transform="rotate(-10 345 260)"/>
  <!-- Chip 4 -->
  <ellipse cx="175" cy="295" rx="13" ry="10" fill="#3D1E08" transform="rotate(25 175 295)"/>
  <ellipse cx="172" cy="291" rx="5" ry="3" fill="rgba(255,255,255,0.12)" transform="rotate(25 172 291)"/>
  <!-- Chip 5 -->
  <ellipse cx="260" cy="310" rx="12" ry="9" fill="#3D1E08" transform="rotate(-5 260 310)"/>
  <!-- Chip 6 pequeño -->
  <ellipse cx="225" cy="165" rx="9" ry="7" fill="#3D1E08" transform="rotate(10 225 165)"/>
  <!-- Chip 7 -->
  <ellipse cx="370" cy="205" rx="11" ry="8" fill="#3D1E08" transform="rotate(-15 370 205)"/>

  <!-- === TOPPING: ESPIRAL DE CREMA DE PISTACHO === -->
  <!-- Líneas gruesas de pistacho que caen desde el centro -->
  <g filter="url(#shadow-sm)">
    <!-- Línea principal 1 (izquierda-centro) -->
    <path d="M 200 148 Q 210 175 195 205 Q 182 235 198 265 Q 212 292 200 320"
          stroke="url(#pist-grad)" stroke-width="11" fill="none"
          stroke-linecap="round" opacity="0.95"/>
    <!-- Línea principal 2 (centro) -->
    <path d="M 255 135 Q 270 168 255 200 Q 240 232 258 265 Q 272 295 258 328"
          stroke="url(#pist-grad)" stroke-width="13" fill="none"
          stroke-linecap="round" opacity="0.9"/>
    <!-- Línea principal 3 (derecha) -->
    <path d="M 310 148 Q 298 180 312 212 Q 325 242 308 272 Q 293 300 308 325"
          stroke="url(#pist-grad)" stroke-width="11" fill="none"
          stroke-linecap="round" opacity="0.95"/>
    <!-- Hilo fino cruzado 1 -->
    <path d="M 185 185 Q 230 178 275 185 Q 315 190 345 180"
          stroke="url(#pist-grad)" stroke-width="5" fill="none"
          stroke-linecap="round" opacity="0.7"/>
    <!-- Hilo fino cruzado 2 -->
    <path d="M 180 245 Q 225 238 272 245 Q 315 252 348 242"
          stroke="url(#pist-grad)" stroke-width="5" fill="none"
          stroke-linecap="round" opacity="0.7"/>
    <!-- Hilo fino cruzado 3 -->
    <path d="M 188 305 Q 232 298 278 305 Q 320 310 342 300"
          stroke="url(#pist-grad)" stroke-width="4.5" fill="none"
          stroke-linecap="round" opacity="0.65"/>
  </g>

  <!-- === TOPPING: HILO DE CHOCOLATE (acento) === -->
  <g opacity="0.85">
    <path d="M 232 140 Q 248 165 232 198 Q 218 228 234 260 Q 248 288 234 318"
          stroke="url(#choc-grad)" stroke-width="6" fill="none"
          stroke-linecap="round" stroke-dasharray="0"/>
    <path d="M 290 143 Q 278 170 292 202 Q 304 232 288 262 Q 274 290 288 318"
          stroke="url(#choc-grad)" stroke-width="6" fill="none"
          stroke-linecap="round"/>
  </g>

  <!-- === PERLAS DECORATIVAS (sprinkles) === -->
  <!-- Perlas rosas -->
  <circle cx="195" cy="148" r="7"  fill="#F2A8B5" stroke="white" stroke-width="1.5"/>
  <circle cx="318" cy="155" r="6"  fill="#F2A8B5" stroke="white" stroke-width="1.5"/>
  <circle cx="172" cy="260" r="5.5" fill="#F2A8B5" stroke="white" stroke-width="1.5"/>
  <circle cx="342" cy="278" r="6"  fill="#F2A8B5" stroke="white" stroke-width="1.5"/>
  <circle cx="250" cy="328" r="5"  fill="#F2A8B5" stroke="white" stroke-width="1.5"/>
  <!-- Perlas lavanda -->
  <circle cx="350" cy="198" r="5"  fill="#C5C4E8" stroke="white" stroke-width="1.5"/>
  <circle cx="155" cy="228" r="5.5" fill="#C5C4E8" stroke="white" stroke-width="1.5"/>
  <circle cx="285" cy="335" r="5"  fill="#C5C4E8" stroke="white" stroke-width="1.5"/>
  <!-- Perlas caramelo/doradas pequeñas -->
  <circle cx="228" cy="145" r="4.5" fill="#E8A84A" stroke="white" stroke-width="1.5"/>
  <circle cx="272" cy="330" r="4"  fill="#E8A84A" stroke="white" stroke-width="1.5"/>

  <!-- === BRILLO EN LA SUPERFICIE (higlight) === -->
  <ellipse cx="195" cy="175" rx="45" ry="28" fill="rgba(255,255,255,0.14)" transform="rotate(-35 195 175)"/>
</svg>
